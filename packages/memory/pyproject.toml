[project]
name = "pynosqlc-memory"
version = "0.1.0"
description = "In-memory driver for pynosqlc — zero-dependency dict-backed storage for testing"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pynosqlc-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pynosqlc"]

[tool.uv.sources]
pynosqlc-core = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
