[project]
name = "pynosqlc-core"
version = "0.1.0"
description = "Core abstraction hierarchy for pynosqlc — Driver, DriverManager, Client, Collection, Cursor, Filter, FieldCondition, UnsupportedOperationError, compliance suite"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pynosqlc"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
