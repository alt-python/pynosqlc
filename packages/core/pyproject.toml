[project]
name = "alt-python-pynosqlc-core"
version = "1.0.0"
description = "Core abstraction hierarchy for pynosqlc — Driver, DriverManager, Client, Collection, Cursor, Filter, FieldCondition, UnsupportedOperationError, compliance suite"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []
authors = [
    {name = "Craig Parravicini"},
    {name = "Claude (Anthropic)"},
]
license = {text = "MIT"}
keywords = ["nosql", "database", "async", "driver"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/alt-python/pynosqlc"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pynosqlc"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
