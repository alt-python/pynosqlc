[project]
name = "pynosqlc-dynamodb"
version = "0.1.0"
description = "DynamoDB driver for pynosqlc"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pynosqlc-core",
    "aioboto3>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pynosqlc"]

[tool.uv.sources]
pynosqlc-core = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
