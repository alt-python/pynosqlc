[project]
name = "pynosqlc-mongodb"
version = "0.1.0"
description = "MongoDB driver for pynosqlc"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pynosqlc-core",
    "pymongo>=4.6",
]
authors = [{name = "pynosqlc Contributors"}]
license = {text = "MIT"}
keywords = ["nosql", "database", "async", "mongodb", "driver"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pynosqlc"]

[tool.uv.sources]
pynosqlc-core = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
