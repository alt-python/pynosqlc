name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
    strategy:
      matrix:
        package: [core, memory, mongodb, dynamodb, cosmosdb, redis, cassandra]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build ${{ matrix.package }}
        run: uv build --directory packages/${{ matrix.package }}
      - name: Publish ${{ matrix.package }}
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}
        run: uv publish --directory packages/${{ matrix.package }}
