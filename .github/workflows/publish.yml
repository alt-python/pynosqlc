name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write  # Required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    strategy:
      matrix:
        package: [core, memory, mongodb, dynamodb, cosmosdb, redis, cassandra]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --frozen
      - name: Build ${{ matrix.package }}
        run: uv build --directory packages/${{ matrix.package }}
      - name: Publish ${{ matrix.package }}
        run: uv publish --directory packages/${{ matrix.package }} --trusted-publishing=always
